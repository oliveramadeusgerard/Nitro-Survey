<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1200"/>
      <stop offset="100%" style="stop-color:#2b1f00"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1e"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2d2000"/>
    </linearGradient>
    <linearGradient id="marble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="40%" style="stop-color:#e8dfc8"/>
      <stop offset="70%" style="stop-color:#f0e8d8"/>
      <stop offset="100%" style="stop-color:#d4c9a8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffab00"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#a0522d"/>
    </linearGradient>
    <linearGradient id="goldcar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc107"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="marbleVein" x="0" y="0" width="60" height="80" patternUnits="userSpaceOnUse">
      <rect width="60" height="80" fill="#f5f0e8"/>
      <path d="M10 0 Q20 20 15 40 Q10 60 20 80" fill="none" stroke="#d4c9a8" stroke-width="0.8" opacity="0.5"/>
      <path d="M35 0 Q25 25 30 50 Q35 70 28 80" fill="none" stroke="#c8bda0" stroke-width="0.6" opacity="0.4"/>
      <path d="M50 10 Q45 30 48 55 Q50 70 45 80" fill="none" stroke="#d4c9a8" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Panel 1 - Top left: Temple at night sky -->
  <rect x="12" y="12" width="270" height="210" rx="6" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="60" cy="18" r="1" fill="white" opacity="0.7"/>
  <circle cx="90" cy="30" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="130" cy="20" r="1" fill="white" opacity="0.6"/>
  <circle cx="155" cy="35" r="2" fill="white" opacity="0.8"/>
  <circle cx="185" cy="22" r="1" fill="white" opacity="0.7"/>
  <circle cx="215" cy="28" r="1.5" fill="white" opacity="0.85"/>
  <circle cx="245" cy="18" r="1" fill="white" opacity="0.7"/>
  <circle cx="260" cy="40" r="1" fill="white" opacity="0.6"/>
  <circle cx="40" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="75" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="50" r="1" fill="white" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="230" cy="40" r="22" fill="#fff9c4" opacity="0.9"/>
  <circle cx="238" cy="35" r="18" fill="url(#sky)" opacity="0.3"/>
  <!-- Temple/Parthenon on hill -->
  <!-- Hill -->
  <path d="M12 170 Q80 140 141 160 Q200 180 282 155 L282 222 L12 222 Z" fill="#1a1400"/>
  <path d="M12 185 Q70 165 141 175 Q200 188 282 168 L282 222 L12 222 Z" fill="#241d00"/>
  <!-- Temple columns -->
  <rect x="60" y="115" width="8" height="60" fill="#f5f0e8" opacity="0.7"/>
  <rect x="80" y="115" width="8" height="60" fill="#e8dfc8" opacity="0.7"/>
  <rect x="100" y="115" width="8" height="60" fill="#f5f0e8" opacity="0.7"/>
  <rect x="120" y="115" width="8" height="60" fill="#e8dfc8" opacity="0.7"/>
  <rect x="140" y="115" width="8" height="60" fill="#f5f0e8" opacity="0.7"/>
  <rect x="160" y="115" width="8" height="60" fill="#e8dfc8" opacity="0.7"/>
  <rect x="180" y="115" width="8" height="60" fill="#f5f0e8" opacity="0.7"/>
  <rect x="200" y="115" width="8" height="60" fill="#e8dfc8" opacity="0.7"/>
  <!-- Entablature (horizontal beam) -->
  <rect x="55" y="110" width="160" height="12" fill="#f0e8d8" opacity="0.8"/>
  <!-- Pediment (triangular roof) -->
  <polygon points="55,110 135,80 215,110" fill="#e8dfc8" opacity="0.75"/>
  <polygon points="60,110 135,85 210,110" fill="none" stroke="#d4c9a8" stroke-width="1" opacity="0.6"/>
  <!-- Temple glow from within -->
  <rect x="55" y="110" width="160" height="65" fill="#ffd700" opacity="0.04" filter="url(#glow2)"/>
  <!-- Stylobate (base) -->
  <rect x="50" y="172" width="175" height="8" fill="#e8dfc8" opacity="0.6"/>
  <rect x="45" y="178" width="185" height="6" fill="#d4c9a8" opacity="0.5"/>

  <!-- Panel 2 - Top right: Apollo's golden chariot scene -->
  <rect x="294" y="12" width="294" height="210" rx="6" fill="#1a0c00"/>
  <!-- Sun burst background -->
  <circle cx="441" cy="100" r="80" fill="#ff8f00" opacity="0.12"/>
  <circle cx="441" cy="100" r="55" fill="#ffc107" opacity="0.1"/>
  <!-- Sun rays -->
  <line x1="441" y1="12" x2="441" y2="35" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <line x1="530" y1="30" x2="514" y2="50" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <line x1="570" y1="100" x2="548" y2="100" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <line x1="530" y1="170" x2="514" y2="152" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <line x1="441" y1="188" x2="441" y2="168" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <line x1="352" y1="170" x2="368" y2="152" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <line x1="312" y1="100" x2="334" y2="100" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <line x1="352" y1="30" x2="368" y2="50" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <!-- Golden car - Apollo's chariot car -->
  <rect x="360" y="130" width="170" height="55" rx="10" fill="url(#goldcar)"/>
  <rect x="373" y="112" width="140" height="30" rx="8" fill="#ffd700"/>
  <!-- Windows -->
  <rect x="380" y="115" width="55" height="24" rx="4" fill="#fffde7" opacity="0.5"/>
  <rect x="443" y="115" width="60" height="24" rx="4" fill="#fffde7" opacity="0.5"/>
  <!-- Shine on car -->
  <path d="M368 136 Q390 128 435 132" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <!-- Sun symbol on door -->
  <circle cx="420" cy="158" r="12" fill="none" stroke="#fff9c4" stroke-width="2" opacity="0.7"/>
  <circle cx="420" cy="158" r="4" fill="#fff9c4" opacity="0.8"/>
  <!-- Solar ribbon trail -->
  <path d="M360 148 Q330 140 310 148 Q290 156 270 148 Q280 140 300 138 Q330 134 360 144" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <path d="M360 158 Q330 166 310 158 Q290 150 270 158 Q280 166 300 168 Q330 172 360 162" fill="none" stroke="#ffab00" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  <!-- Gold dust particles -->
  <circle cx="310" cy="148" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="320" cy="160" r="1.5" fill="#ffc107" opacity="0.5"/>
  <circle cx="295" cy="155" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="330" cy="142" r="1.5" fill="#ffd700" opacity="0.4"/>
  <!-- Drachma coins -->
  <circle cx="300" cy="152" r="4" fill="#ffd700" opacity="0.5"/>
  <circle cx="285" cy="158" r="3" fill="#ffab00" opacity="0.4"/>
  <!-- Wheels -->
  <circle cx="392" cy="188" r="19" fill="#cd7f32"/>
  <circle cx="392" cy="188" r="12" fill="#e6a020"/>
  <circle cx="392" cy="188" r="5" fill="#ffd700"/>
  <circle cx="510" cy="188" r="19" fill="#cd7f32"/>
  <circle cx="510" cy="188" r="12" fill="#e6a020"/>
  <circle cx="510" cy="188" r="5" fill="#ffd700"/>
  <!-- Ground with golden dust -->
  <rect x="294" y="205" width="294" height="17" fill="#1a0c00"/>
  <path d="M294 208 Q380 204 441 208 Q520 212 588 206 L588 222 L294 222 Z" fill="#241500"/>

  <!-- Panel 3 - Middle left: Marble texture close-up -->
  <rect x="12" y="234" width="185" height="175" rx="6" fill="url(#marble)"/>
  <!-- Marble veins -->
  <path d="M12 250 Q50 260 80 245 Q110 230 150 255 Q180 270 197 250" fill="none" stroke="#c8bda0" stroke-width="2" opacity="0.5"/>
  <path d="M12 280 Q40 270 70 285 Q100 300 130 275 Q160 250 197 278" fill="none" stroke="#d4c9a8" stroke-width="1.5" opacity="0.4"/>
  <path d="M12 320 Q60 310 100 325 Q140 340 197 315" fill="none" stroke="#c0b090" stroke-width="2" opacity="0.45"/>
  <path d="M30 234 Q45 270 38 310 Q32 350 40 390 Q45 400 50 409" fill="none" stroke="#d4c9a8" stroke-width="1" opacity="0.4"/>
  <path d="M100 234 Q112 265 105 300 Q98 340 110 380 Q116 400 112 409" fill="none" stroke="#c8bda0" stroke-width="1.2" opacity="0.35"/>
  <path d="M160 234 Q172 270 165 310 Q158 345 168 380 Q175 400 170 409" fill="none" stroke="#d0c4a0" stroke-width="1" opacity="0.3"/>
  <!-- Gold inlay lines -->
  <path d="M12 260 Q60 255 100 263 Q140 271 197 258" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <path d="M12 350 Q55 344 100 352 Q145 360 197 346" fill="none" stroke="#ffab00" stroke-width="0.8" opacity="0.35"/>
  <!-- Carved relief - laurel wreath -->
  <circle cx="104" cy="320" r="35" fill="none" stroke="#d4c9a8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="104" cy="320" r="28" fill="none" stroke="#c8bda0" stroke-width="1" opacity="0.3"/>
  <!-- Leaf details on wreath -->
  <ellipse cx="82" cy="295" rx="6" ry="10" fill="#c8bda0" opacity="0.3" transform="rotate(-30,82,295)"/>
  <ellipse cx="95" cy="288" rx="6" ry="10" fill="#d4c9a8" opacity="0.3" transform="rotate(-15,95,288)"/>
  <ellipse cx="110" cy="286" rx="6" ry="10" fill="#c8bda0" opacity="0.3" transform="rotate(5,110,286)"/>
  <ellipse cx="124" cy="290" rx="6" ry="10" fill="#d4c9a8" opacity="0.3" transform="rotate(20,124,290)"/>
  <ellipse cx="133" cy="300" rx="6" ry="10" fill="#c8bda0" opacity="0.3" transform="rotate(40,133,300)"/>
  <!-- Center motif -->
  <path d="M97 320 L104 310 L111 320 L104 330 Z" fill="#d4c9a8" opacity="0.4"/>

  <!-- Panel 4 - Middle center: Zeus lightning bolt scene -->
  <rect x="209" y="234" width="185" height="175" rx="6" fill="#0d0a1e"/>
  <!-- Storm clouds -->
  <ellipse cx="280" cy="265" rx="50" ry="28" fill="#1a1a2e"/>
  <ellipse cx="320" cy="255" rx="55" ry="25" fill="#222238"/>
  <ellipse cx="355" cy="268" rx="42" ry="22" fill="#1a1a2e"/>
  <ellipse cx="250" cy="272" rx="40" ry="20" fill="#222238"/>
  <!-- Lightning bolt - Zeus -->
  <polyline points="301,270 288,310 298,310 282,355 300,355 278,409" fill="none" stroke="#b3e5fc" stroke-width="1.5" opacity="0.3"/>
  <polyline points="301,270 288,310 298,310 282,355 300,355 278,409" fill="none" stroke="#fff" stroke-width="0.5"/>
  <!-- Main lightning bolt bright -->
  <polyline points="305,268 292,308 302,308 285,352 303,352 280,409" fill="none" stroke="#e3f2fd" stroke-width="3" filter="url(#glow2)" opacity="0.9"/>
  <polyline points="305,268 292,308 302,308 285,352 303,352 280,409" fill="none" stroke="white" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Lightning glow on clouds -->
  <ellipse cx="295" cy="280" rx="30" ry="15" fill="#64b5f6" opacity="0.1" filter="url(#glow2)"/>
  <!-- Secondary lightning -->
  <polyline points="340,272 330,295 336,295 322,330" fill="none" stroke="#90caf9" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
  <!-- Ground static electricity -->
  <line x1="220" y1="395" x2="250" y2="390" stroke="#64b5f6" stroke-width="1" opacity="0.4"/>
  <line x1="240" y1="400" x2="265" y2="394" stroke="#90caf9" stroke-width="0.8" opacity="0.3"/>
  <line x1="260" y1="405" x2="290" y2="398" stroke="#64b5f6" stroke-width="1" opacity="0.35"/>
  <line x1="300" y1="407" x2="330" y2="401" stroke="#90caf9" stroke-width="0.8" opacity="0.3"/>
  <line x1="330" y1="400" x2="360" y2="395" stroke="#64b5f6" stroke-width="1" opacity="0.4"/>
  <line x1="355" y1="405" x2="390" y2="400" stroke="#90caf9" stroke-width="0.8" opacity="0.3"/>
  <!-- Stars above -->
  <circle cx="220" cy="238" r="1" fill="white" opacity="0.6"/>
  <circle cx="250" cy="242" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="330" cy="238" r="1" fill="white" opacity="0.5"/>
  <circle cx="370" cy="245" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="385" cy="236" r="1" fill="white" opacity="0.7"/>

  <!-- Panel 5 - Middle right: Dark Hades car -->
  <rect x="406" y="234" width="182" height="175" rx="6" fill="#080510"/>
  <!-- Underworld atmosphere -->
  <rect x="406" y="330" width="182" height="79" fill="#0d0a1e"/>
  <!-- Ashen ground -->
  <path d="M406 370 Q450 362 497 368 Q540 374 588 365 L588 409 L406 409 Z" fill="#1a1530"/>
  <!-- Dark hades car -->
  <rect x="420" y="280" width="155" height="52" rx="8" fill="#1a1530"/>
  <rect x="430" y="263" width="130" height="28" rx="6" fill="#241c3d"/>
  <!-- Windows dark tint -->
  <rect x="435" y="265" width="50" height="22" rx="3" fill="#0d0a18" opacity="0.9"/>
  <rect x="493" y="265" width="58" height="22" rx="3" fill="#0d0a18" opacity="0.9"/>
  <!-- Skeletal/bone detail on car -->
  <path d="M440 295 Q460 290 480 295 Q500 300 520 295" fill="none" stroke="#3d3050" stroke-width="1.5" opacity="0.6"/>
  <!-- Ashen trail -->
  <ellipse cx="408" cy="300" rx="30" ry="8" fill="#4a4060" opacity="0.3"/>
  <ellipse cx="395" cy="300" rx="22" ry="6" fill="#3d3558" opacity="0.25"/>
  <!-- Red cinders -->
  <circle cx="400" cy="295" r="2" fill="#b71c1c" opacity="0.6"/>
  <circle cx="388" cy="302" r="1.5" fill="#c62828" opacity="0.5"/>
  <circle cx="415" cy="290" r="1.5" fill="#b71c1c" opacity="0.4"/>
  <circle cx="405" cy="308" r="1" fill="#c62828" opacity="0.4"/>
  <!-- Wheels bone-like -->
  <circle cx="455" cy="334" r="17" fill="#0d0a18"/>
  <circle cx="455" cy="334" r="10" fill="#1a1530"/>
  <circle cx="455" cy="334" r="4" fill="#3d3050"/>
  <circle cx="543" cy="334" r="17" fill="#0d0a18"/>
  <circle cx="543" cy="334" r="10" fill="#1a1530"/>
  <circle cx="543" cy="334" r="4" fill="#3d3050"/>
  <!-- Hellfire underglow purple -->
  <ellipse cx="497" cy="352" rx="70" ry="10" fill="#6a1b9a" opacity="0.3" filter="url(#glow2)"/>
  <!-- Greek skull motif faint -->
  <circle cx="497" cy="310" r="8" fill="none" stroke="#4a3a6a" stroke-width="1" opacity="0.4"/>
  <circle cx="493" cy="308" r="2" fill="#4a3a6a" opacity="0.3"/>
  <circle cx="501" cy="308" r="2" fill="#4a3a6a" opacity="0.3"/>
  <line x1="494" y1="314" x2="500" y2="314" stroke="#4a3a6a" stroke-width="1" opacity="0.3"/>

  <!-- Panel 6 - Bottom: Grand olympus panorama -->
  <rect x="12" y="421" width="576" height="167" rx="6" fill="#0d0c1e"/>
  <!-- Mount Olympus silhouette -->
  <path d="M12 480 Q80 430 160 455 Q240 480 300 420 Q360 360 420 430 Q480 490 540 455 Q565 445 588 450 L588 588 L12 588 Z" fill="#1a1430"/>
  <path d="M12 510 Q100 475 200 500 Q300 525 400 490 Q480 468 588 490 L588 588 L12 588 Z" fill="#241d40"/>
  <!-- Columns along bottom -->
  <rect x="40" y="500" width="14" height="88" fill="#f5f0e8" opacity="0.25"/>
  <rect x="80" y="510" width="14" height="78" fill="#e8dfc8" opacity="0.25"/>
  <rect x="120" y="505" width="14" height="83" fill="#f5f0e8" opacity="0.22"/>
  <rect x="160" y="515" width="14" height="73" fill="#e8dfc8" opacity="0.2"/>
  <rect x="420" y="508" width="14" height="80" fill="#f5f0e8" opacity="0.22"/>
  <rect x="460" y="502" width="14" height="86" fill="#e8dfc8" opacity="0.25"/>
  <rect x="500" y="512" width="14" height="76" fill="#f5f0e8" opacity="0.22"/>
  <rect x="540" y="505" width="14" height="83" fill="#e8dfc8" opacity="0.2"/>
  <!-- Racing car on olympus road -->
  <rect x="230" y="500" width="140" height="44" rx="8" fill="#cd7f32"/>
  <rect x="242" y="484" width="112" height="26" rx="6" fill="url(#bronze)"/>
  <!-- Gold accents -->
  <rect x="230" y="500" width="140" height="6" rx="0" fill="#ffd700" opacity="0.5"/>
  <rect x="230" y="538" width="140" height="4" rx="0" fill="#ffd700" opacity="0.4"/>
  <!-- Windows -->
  <rect x="248" y="487" width="44" height="20" rx="3" fill="#fff9c4" opacity="0.3"/>
  <rect x="300" y="487" width="46" height="20" rx="3" fill="#fff9c4" opacity="0.3"/>
  <!-- Wheels -->
  <circle cx="262" cy="546" r="16" fill="#7b3f00"/>
  <circle cx="262" cy="546" r="10" fill="#a05000"/>
  <circle cx="262" cy="546" r="4" fill="#ffd700"/>
  <circle cx="348" cy="546" r="16" fill="#7b3f00"/>
  <circle cx="348" cy="546" r="10" fill="#a05000"/>
  <circle cx="348" cy="546" r="4" fill="#ffd700"/>
  <!-- Gold solar ribbon trail -->
  <path d="M230 510 Q200 504 170 510 Q145 516 120 510 Q135 502 160 500 Q195 496 230 506" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <path d="M230 524 Q200 530 170 524 Q145 518 120 524 Q135 532 160 534 Q195 538 230 528" fill="none" stroke="#ffab00" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <!-- Gold coin/drachma particles -->
  <circle cx="180" cy="515" r="3.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="162" cy="520" r="3" fill="#ffab00" opacity="0.4"/>
  <circle cx="145" cy="513" r="3" fill="#ffd700" opacity="0.4"/>
  <!-- Stars overhead -->
  <circle cx="80" cy="430" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="150" cy="425" r="1" fill="white" opacity="0.6"/>
  <circle cx="300" cy="428" r="2" fill="#ffd700" opacity="0.8" filter="url(#glow)"/>
  <circle cx="450" cy="422" r="1" fill="white" opacity="0.6"/>
  <circle cx="530" cy="430" r="1.5" fill="white" opacity="0.7"/>
  <!-- Laurel wreath overlay top center -->
  <text x="300" y="448" font-family="serif" font-size="28" fill="#ffd700" text-anchor="middle" opacity="0.35">☽</text>

  <!-- Season label -->
  <rect x="0" y="558" width="600" height="42" fill="rgba(20,15,0,0.92)"/>
  <text x="300" y="577" font-family="Georgia, serif" font-size="11" fill="#ffd700" text-anchor="middle" letter-spacing="3" opacity="0.8">✦ THE MYTHIC ODYSSEY ✦</text>
  <text x="300" y="593" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#ffd700" text-anchor="middle" letter-spacing="4" filter="url(#glow)">THE NITRO MYTH</text>
</svg>
