<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0618"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#3d0a3d"/>
    </linearGradient>
    <linearGradient id="neon2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a2b"/>
      <stop offset="100%" style="stop-color:#1a1050"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="car1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0a5c"/>
      <stop offset="100%" style="stop-color:#4a0e8f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Panel 1 - Top left: Neon cityscape -->
  <rect x="12" y="12" width="270" height="200" rx="6" fill="url(#neon2)"/>
  <!-- Buildings silhouette -->
  <rect x="20" y="100" width="30" height="112" fill="#0a0a1e"/>
  <rect x="55" y="80" width="25" height="132" fill="#0d0d22"/>
  <rect x="85" y="115" width="35" height="97" fill="#0a0a1e"/>
  <rect x="125" y="70" width="28" height="142" fill="#0d0d22"/>
  <rect x="158" y="90" width="22" height="122" fill="#0a0a1e"/>
  <rect x="185" y="60" width="35" height="152" fill="#0d0d22"/>
  <rect x="225" y="95" width="25" height="117" fill="#0a0a1e"/>
  <rect x="255" y="75" width="22" height="137" fill="#0d0d22"/>
  <!-- Neon windows -->
  <rect x="28" y="108" width="6" height="5" fill="#e040fb" opacity="0.9"/>
  <rect x="38" y="120" width="6" height="5" fill="#00b0ff" opacity="0.9"/>
  <rect x="28" y="128" width="6" height="5" fill="#e040fb" opacity="0.7"/>
  <rect x="38" y="140" width="6" height="5" fill="#00b0ff" opacity="0.8"/>
  <rect x="62" y="88" width="6" height="5" fill="#00e5ff" opacity="0.9"/>
  <rect x="71" y="100" width="6" height="5" fill="#e040fb" opacity="0.8"/>
  <rect x="62" y="112" width="6" height="5" fill="#00b0ff" opacity="0.9"/>
  <rect x="71" y="120" width="6" height="5" fill="#00e5ff" opacity="0.7"/>
  <rect x="133" y="78" width="6" height="5" fill="#e040fb" opacity="0.9"/>
  <rect x="143" y="90" width="6" height="5" fill="#00e5ff" opacity="0.8"/>
  <rect x="133" y="105" width="6" height="5" fill="#00b0ff" opacity="0.9"/>
  <rect x="190" y="68" width="8" height="6" fill="#e040fb" opacity="0.9"/>
  <rect x="203" y="80" width="8" height="6" fill="#00e5ff" opacity="0.9"/>
  <rect x="190" y="95" width="8" height="6" fill="#00b0ff" opacity="0.8"/>
  <rect x="203" y="110" width="8" height="6" fill="#e040fb" opacity="0.9"/>
  <!-- Neon signs on buildings -->
  <rect x="188" y="65" width="30" height="8" rx="2" fill="none" stroke="#e040fb" stroke-width="1.5" filter="url(#glow)"/>
  <text x="203" y="72" font-family="Arial" font-size="5" fill="#e040fb" text-anchor="middle" filter="url(#glow)">ニトロ</text>
  <rect x="128" y="72" width="28" height="7" rx="2" fill="none" stroke="#00e5ff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="142" y="78" font-family="Arial" font-size="5" fill="#00e5ff" text-anchor="middle" filter="url(#glow)">SPEED</text>
  <!-- Rain streaks -->
  <line x1="30" y1="12" x2="25" y2="80" stroke="rgba(100,180,255,0.15)" stroke-width="0.8"/>
  <line x1="70" y1="12" x2="65" y2="100" stroke="rgba(100,180,255,0.12)" stroke-width="0.8"/>
  <line x1="110" y1="12" x2="105" y2="90" stroke="rgba(100,180,255,0.15)" stroke-width="0.8"/>
  <line x1="150" y1="12" x2="145" y2="85" stroke="rgba(100,180,255,0.12)" stroke-width="0.8"/>
  <line x1="190" y1="12" x2="185" y2="95" stroke="rgba(100,180,255,0.15)" stroke-width="0.8"/>
  <line x1="230" y1="12" x2="225" y2="80" stroke="rgba(100,180,255,0.12)" stroke-width="0.8"/>
  <line x1="265" y1="12" x2="260" y2="88" stroke="rgba(100,180,255,0.1)" stroke-width="0.8"/>
  <!-- Wet road reflection -->
  <rect x="12" y="190" width="270" height="22" fill="#0d1a2e"/>
  <path d="M12 195 Q80 192 150 196 Q220 200 282 194 L282 212 L12 212 Z" fill="#1a2a40" opacity="0.5"/>
  <!-- Reflection of neon in wet road -->
  <rect x="190" y="195" width="30" height="10" rx="1" fill="#e040fb" opacity="0.15"/>
  <rect x="130" y="197" width="22" height="8" rx="1" fill="#00e5ff" opacity="0.15"/>

  <!-- Panel 2 - Top right: Drifting car in rain -->
  <rect x="294" y="12" width="294" height="200" rx="6" fill="url(#neon1)"/>
  <!-- Rainy mountain pass background -->
  <path d="M294 120 Q360 80 430 110 Q500 140 588 90 L588 212 L294 212 Z" fill="#0a0a1e"/>
  <path d="M294 150 Q370 120 450 145 Q530 170 588 130 L588 212 L294 212 Z" fill="#0d0d22"/>
  <!-- Guardrails -->
  <line x1="294" y1="175" x2="588" y2="155" stroke="#aaa" stroke-width="1.5" opacity="0.4"/>
  <line x1="294" y1="185" x2="588" y2="165" stroke="#888" stroke-width="1" opacity="0.3"/>
  <!-- Road -->
  <path d="M294 185 Q440 170 588 165 L588 212 L294 212 Z" fill="#1a1a2e"/>
  <!-- Road lines -->
  <path d="M320 200 Q370 195 410 193" fill="none" stroke="rgba(255,255,100,0.4)" stroke-width="1.5" stroke-dasharray="20,10"/>
  <!-- Drifting car - GT-R style -->
  <g transform="translate(440,160) rotate(-8)">
    <!-- Car body -->
    <rect x="-60" y="-20" width="120" height="35" rx="8" fill="#1a0a3d"/>
    <rect x="-50" y="-35" width="95" height="25" rx="6" fill="#2d1a5c"/>
    <!-- Windows -->
    <rect x="-45" y="-32" width="38" height="20" rx="3" fill="#4a3a7a" opacity="0.8"/>
    <rect x="2" y="-32" width="38" height="20" rx="3" fill="#4a3a7a" opacity="0.8"/>
    <!-- Neon underglow - cyan -->
    <ellipse cx="0" cy="18" rx="55" ry="8" fill="#00e5ff" opacity="0.4" filter="url(#glow2)"/>
    <!-- Headlights -->
    <rect x="52" y="-8" width="10" height="6" rx="2" fill="#00e5ff" opacity="0.9"/>
    <rect x="52" y="4" width="10" height="5" rx="2" fill="#00b0ff" opacity="0.8"/>
    <!-- Tail lights -->
    <rect x="-62" y="-8" width="8" height="6" rx="2" fill="#e040fb" opacity="0.9"/>
    <rect x="-62" y="4" width="8" height="5" rx="2" fill="#ff1744" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="-38" cy="18" r="14" fill="#111"/>
    <circle cx="-38" cy="18" r="9" fill="#333"/>
    <circle cx="38" cy="18" r="14" fill="#111"/>
    <circle cx="38" cy="18" r="9" fill="#333"/>
    <!-- Drift smoke -->
    <ellipse cx="-55" cy="20" rx="18" ry="8" fill="rgba(200,200,255,0.2)"/>
    <ellipse cx="-70" cy="18" rx="22" ry="10" fill="rgba(200,200,255,0.15)"/>
    <ellipse cx="-85" cy="15" rx="26" ry="12" fill="rgba(200,200,255,0.1)"/>
  </g>
  <!-- Rain on this panel -->
  <line x1="300" y1="12" x2="294" y2="80" stroke="rgba(150,200,255,0.2)" stroke-width="0.8"/>
  <line x1="340" y1="12" x2="334" y2="90" stroke="rgba(150,200,255,0.18)" stroke-width="0.8"/>
  <line x1="380" y1="12" x2="374" y2="85" stroke="rgba(150,200,255,0.2)" stroke-width="0.8"/>
  <line x1="420" y1="12" x2="414" y2="88" stroke="rgba(150,200,255,0.15)" stroke-width="0.8"/>
  <line x1="460" y1="12" x2="454" y2="80" stroke="rgba(150,200,255,0.2)" stroke-width="0.8"/>
  <line x1="500" y1="12" x2="494" y2="88" stroke="rgba(150,200,255,0.18)" stroke-width="0.8"/>
  <line x1="540" y1="12" x2="534" y2="82" stroke="rgba(150,200,255,0.15)" stroke-width="0.8"/>
  <line x1="580" y1="12" x2="575" y2="85" stroke="rgba(150,200,255,0.2)" stroke-width="0.8"/>

  <!-- Panel 3 - Middle left: Japanese alley -->
  <rect x="12" y="224" width="185" height="180" rx="6" fill="#080610"/>
  <!-- Alley walls -->
  <rect x="12" y="224" width="60" height="180" fill="#0d0d18"/>
  <rect x="137" y="224" width="60" height="180" fill="#0d0d18"/>
  <!-- Alley floor wet reflection -->
  <rect x="72" y="330" width="65" height="74" fill="#12101e"/>
  <!-- Neon signs on left wall -->
  <rect x="20" y="240" width="44" height="22" rx="3" fill="none" stroke="#e040fb" stroke-width="2" filter="url(#glow)"/>
  <text x="42" y="255" font-family="Arial" font-size="9" fill="#e040fb" text-anchor="middle" filter="url(#glow)">幹線</text>
  <rect x="20" y="272" width="44" height="22" rx="3" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>
  <text x="42" y="287" font-family="Arial" font-size="9" fill="#00e5ff" text-anchor="middle" filter="url(#glow)">酒屋</text>
  <rect x="20" y="305" width="44" height="22" rx="3" fill="none" stroke="#ff6d00" stroke-width="2" filter="url(#glow)"/>
  <text x="42" y="320" font-family="Arial" font-size="9" fill="#ff6d00" text-anchor="middle" filter="url(#glow)">居ん</text>
  <!-- Right wall signs -->
  <rect x="143" y="250" width="44" height="22" rx="3" fill="none" stroke="#69f0ae" stroke-width="2" filter="url(#glow)"/>
  <text x="165" y="265" font-family="Arial" font-size="9" fill="#69f0ae" text-anchor="middle" filter="url(#glow)">DRIFT</text>
  <rect x="143" y="285" width="44" height="22" rx="3" fill="none" stroke="#e040fb" stroke-width="2" filter="url(#glow)"/>
  <text x="165" y="300" font-family="Arial" font-size="9" fill="#e040fb" text-anchor="middle" filter="url(#glow)">KING</text>
  <!-- Fog/mist at bottom of alley -->
  <rect x="12" y="370" width="185" height="34" fill="rgba(100,100,180,0.1)"/>
  <!-- Reflection puddle -->
  <ellipse cx="104" cy="385" rx="40" ry="10" fill="#1a1040" opacity="0.6"/>
  <text x="104" y="390" font-family="Arial" font-size="7" fill="#e040fb" text-anchor="middle" opacity="0.4" filter="url(#glow)">幹線</text>

  <!-- Panel 4 - Middle center: Neon grid / retro grid -->
  <rect x="209" y="224" width="185" height="180" rx="6" fill="#050318"/>
  <!-- Perspective grid floor -->
  <line x1="301" y1="260" x2="209" y2="404" stroke="#e040fb" stroke-width="0.8" opacity="0.5"/>
  <line x1="301" y1="260" x2="250" y2="404" stroke="#e040fb" stroke-width="0.8" opacity="0.5"/>
  <line x1="301" y1="260" x2="290" y2="404" stroke="#e040fb" stroke-width="0.7" opacity="0.4"/>
  <line x1="301" y1="260" x2="330" y2="404" stroke="#e040fb" stroke-width="0.7" opacity="0.4"/>
  <line x1="301" y1="260" x2="360" y2="404" stroke="#e040fb" stroke-width="0.8" opacity="0.5"/>
  <line x1="301" y1="260" x2="394" y2="404" stroke="#e040fb" stroke-width="0.8" opacity="0.5"/>
  <!-- Horizontal grid lines (perspective) -->
  <line x1="230" y1="310" x2="372" y2="310" stroke="#00b0ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="218" y1="340" x2="384" y2="340" stroke="#00b0ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="209" y1="370" x2="394" y2="370" stroke="#00b0ff" stroke-width="0.7" opacity="0.4"/>
  <!-- Horizon glow -->
  <rect x="209" y="255" width="185" height="12" fill="#e040fb" opacity="0.15" filter="url(#glow)"/>
  <line x1="209" y1="260" x2="394" y2="260" stroke="#e040fb" stroke-width="2" opacity="0.8" filter="url(#glow)"/>
  <!-- Sun setting on grid -->
  <rect x="260" y="224" width="82" height="38" rx="0" fill="#1a0533"/>
  <rect x="260" y="240" width="82" height="22" rx="0" fill="#2d0040"/>
  <ellipse cx="301" cy="262" rx="35" ry="20" fill="#ff6d00" opacity="0.8" filter="url(#glow2)"/>
  <!-- Sun horizontal lines (retro grid sun) -->
  <line x1="270" y1="248" x2="332" y2="248" stroke="#ff6d00" stroke-width="2.5" opacity="0.6"/>
  <line x1="268" y1="253" x2="334" y2="253" stroke="#ff6d00" stroke-width="2" opacity="0.5"/>
  <line x1="266" y1="257" x2="336" y2="257" stroke="#ff6d00" stroke-width="1.5" opacity="0.5"/>
  <!-- Stars -->
  <circle cx="225" cy="230" r="1" fill="white" opacity="0.7"/>
  <circle cx="250" cy="238" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="350" cy="232" r="1" fill="white" opacity="0.7"/>
  <circle cx="375" cy="240" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="385" cy="228" r="1" fill="white" opacity="0.8"/>

  <!-- Panel 5 - Middle right: Drift car close up -->
  <rect x="406" y="224" width="182" height="180" rx="6" fill="#0a0820"/>
  <!-- Asphalt texture -->
  <rect x="406" y="330" width="182" height="74" fill="#111122"/>
  <!-- Car body - magenta/purple GT-R style close-up -->
  <rect x="418" y="255" width="158" height="80" rx="10" fill="#2d0a5c"/>
  <rect x="425" y="240" width="140" height="35" rx="8" fill="#3d1a70"/>
  <!-- Window -->
  <rect x="432" y="243" width="55" height="28" rx="4" fill="#1a0a40" opacity="0.9"/>
  <rect x="493" y="243" width="65" height="28" rx="4" fill="#1a0a40" opacity="0.9"/>
  <!-- Window gloss -->
  <rect x="434" y="245" width="25" height="8" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="495" y="245" width="30" height="8" rx="2" fill="rgba(255,255,255,0.15)"/>
  <!-- Magenta neon underglow -->
  <ellipse cx="497" cy="340" rx="75" ry="12" fill="#e040fb" opacity="0.35" filter="url(#glow2)"/>
  <!-- Headlights -->
  <rect x="558" y="262" width="12" height="8" rx="2" fill="#00e5ff" filter="url(#glow)"/>
  <rect x="558" y="278" width="12" height="7" rx="2" fill="#00b0ff" filter="url(#glow)"/>
  <!-- Wheels -->
  <circle cx="452" cy="340" r="18" fill="#0a0a14"/>
  <circle cx="452" cy="340" r="11" fill="#1a1a2e"/>
  <circle cx="452" cy="340" r="4" fill="#333"/>
  <circle cx="548" cy="340" r="18" fill="#0a0a14"/>
  <circle cx="548" cy="340" r="11" fill="#1a1a2e"/>
  <circle cx="548" cy="340" r="4" fill="#333"/>
  <!-- Japanese text on car door -->
  <text x="480" y="300" font-family="Arial" font-size="14" fill="#e040fb" opacity="0.6" filter="url(#glow)">ニトロ</text>
  <text x="480" y="316" font-family="Arial" font-size="10" fill="#00e5ff" opacity="0.5" filter="url(#glow)">タイプ</text>
  <!-- Tire smoke -->
  <ellipse cx="430" cy="355" rx="20" ry="8" fill="rgba(150,150,200,0.2)"/>
  <ellipse cx="415" cy="358" rx="15" ry="7" fill="rgba(150,150,200,0.15)"/>

  <!-- Panel 6 - Bottom: Wide city shot with cherry blossoms -->
  <rect x="12" y="416" width="576" height="172" rx="6" fill="#080615"/>
  <!-- Distant skyline -->
  <rect x="20" y="460" width="20" height="128" fill="#0a0a1e"/>
  <rect x="45" y="440" width="15" height="148" fill="#0d0d22"/>
  <rect x="65" y="470" width="25" height="118" fill="#0a0a1e"/>
  <rect x="95" y="450" width="18" height="138" fill="#0d0d22"/>
  <rect x="118" y="430" width="22" height="158" fill="#0a0a1e"/>
  <rect x="145" y="455" width="15" height="133" fill="#0d0d22"/>
  <rect x="165" y="445" width="20" height="143" fill="#0a0a1e"/>
  <rect x="190" y="425" width="25" height="163" fill="#0d0d22"/>
  <rect x="220" y="460" width="18" height="128" fill="#0a0a1e"/>
  <rect x="380" y="445" width="20" height="143" fill="#0a0a1e"/>
  <rect x="405" y="428" width="22" height="160" fill="#0d0d22"/>
  <rect x="432" y="455" width="18" height="133" fill="#0a0a1e"/>
  <rect x="455" y="440" width="25" height="148" fill="#0d0d22"/>
  <rect x="485" y="462" width="15" height="126" fill="#0a0a1e"/>
  <rect x="505" y="432" width="20" height="156" fill="#0d0d22"/>
  <rect x="530" y="450" width="22" height="138" fill="#0a0a1e"/>
  <rect x="557" y="438" width="18" height="150" fill="#0d0d22"/>
  <!-- Road -->
  <rect x="12" y="530" width="576" height="58" fill="#0d0d1e"/>
  <!-- Road center lines -->
  <line x1="12" y1="559" x2="588" y2="559" stroke="rgba(255,255,0,0.2)" stroke-width="1.5" stroke-dasharray="25,15"/>
  <!-- Neon reflections on wet road -->
  <rect x="120" y="535" width="60" height="50" fill="#e040fb" opacity="0.06"/>
  <rect x="300" y="535" width="60" height="50" fill="#00e5ff" opacity="0.06"/>
  <rect x="450" y="535" width="60" height="50" fill="#e040fb" opacity="0.05"/>
  <!-- Speeding car with trail -->
  <rect x="210" y="540" width="130" height="38" rx="6" fill="#2d0a5c"/>
  <rect x="220" y="530" width="105" height="22" rx="5" fill="#3d1a70"/>
  <ellipse cx="205" cy="552" rx="50" ry="8" fill="#e040fb" opacity="0.3" filter="url(#glow2)"/>
  <!-- Speed blur trails -->
  <line x1="100" y1="545" x2="210" y2="545" stroke="#e040fb" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <line x1="80" y1="552" x2="210" y2="552" stroke="#00e5ff" stroke-width="1.5" opacity="0.3" filter="url(#glow)"/>
  <line x1="90" y1="559" x2="210" y2="559" stroke="#e040fb" stroke-width="1" opacity="0.25"/>
  <!-- Cherry blossoms scattered -->
  <circle cx="50" cy="440" r="3" fill="#f8bbd0" opacity="0.7"/>
  <circle cx="65" cy="425" r="2.5" fill="#f48fb1" opacity="0.6"/>
  <circle cx="80" cy="450" r="3" fill="#f8bbd0" opacity="0.5"/>
  <circle cx="500" cy="435" r="3" fill="#f8bbd0" opacity="0.7"/>
  <circle cx="515" cy="445" r="2" fill="#f48fb1" opacity="0.6"/>
  <circle cx="530" cy="430" r="2.5" fill="#f8bbd0" opacity="0.5"/>
  <!-- Neon building highlights -->
  <line x1="118" y1="430" x2="118" y2="450" stroke="#e040fb" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="190" y1="425" x2="190" y2="445" stroke="#00e5ff" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="405" y1="428" x2="405" y2="448" stroke="#e040fb" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="505" y1="432" x2="505" y2="452" stroke="#00e5ff" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>

  <!-- Season label -->
  <rect x="0" y="558" width="600" height="42" fill="rgba(30,5,60,0.9)"/>
  <text x="300" y="577" font-family="Arial, sans-serif" font-size="11" fill="#e040fb" text-anchor="middle" letter-spacing="2" filter="url(#glow)">ニトロシティ</text>
  <text x="300" y="592" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">NITRO CITY</text>
</svg>
